<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- SOMA Premium Logo: App Icon Version -->
  <!-- Optimized for app stores (iOS, Android, Web) -->
  <!-- Works perfectly at 192x192, 180x180, 512x512 -->

  <!-- Background: Pure white (required for app stores) -->
  <rect width="200" height="200" fill="white"/>

  <!-- Icon with safe margins -->
  <g transform="translate(100, 100)">
    <!-- Outer circle (O) -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="black" stroke-width="8"/>

    <!-- S curve -->
    <!-- Upper arc of S -->
    <path d="M -8 -35
             C 10 -37, 25 -28, 27 -15
             C 28 -5, 22 2, 12 4"
          fill="none" stroke="black" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Lower arc of S -->
    <path d="M -5 15
             C -15 17, -20 23, -20 33
             C -20 47, -8 57, 10 57
             C 25 57, 35 50, 37 40"
          fill="none" stroke="black" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
