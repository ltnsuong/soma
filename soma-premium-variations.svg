<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- SOMA Premium Logo: Background Variations -->

  <!-- VERSION 1: Icon on White Background -->
  <g>
    <rect x="0" y="0" width="200" height="200" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="100" cy="100" r="82" fill="none" stroke="black" stroke-width="8.5"/>
    <path d="M 90 52 C 105 50, 120 58, 122 72 C 123 80, 118 86, 108 88"
          fill="none" stroke="black" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 92 112 C 82 114, 78 120, 78 130 C 78 142, 88 150, 105 150 C 118 150, 128 144, 130 135"
          fill="none" stroke="black" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="100" y="225" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="black" text-anchor="middle">White Background</text>
  </g>

  <!-- VERSION 2: Icon on Black Background -->
  <g transform="translate(200, 0)">
    <rect x="0" y="0" width="200" height="200" fill="black"/>
    <circle cx="100" cy="100" r="82" fill="none" stroke="white" stroke-width="8.5"/>
    <path d="M 90 52 C 105 50, 120 58, 122 72 C 123 80, 118 86, 108 88"
          fill="none" stroke="white" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 92 112 C 82 114, 78 120, 78 130 C 78 142, 88 150, 105 150 C 118 150, 128 144, 130 135"
          fill="none" stroke="white" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="100" y="225" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Black Background</text>
  </g>

  <!-- VERSION 3: Monochrome (Outline, Gray) -->
  <g transform="translate(400, 0)">
    <rect x="0" y="0" width="200" height="200" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="100" cy="100" r="82" fill="none" stroke="#A0AEC0" stroke-width="8.5"/>
    <path d="M 90 52 C 105 50, 120 58, 122 72 C 123 80, 118 86, 108 88"
          fill="none" stroke="#A0AEC0" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 92 112 C 82 114, 78 120, 78 130 C 78 142, 88 150, 105 150 C 118 150, 128 144, 130 135"
          fill="none" stroke="#A0AEC0" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="100" y="225" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#A0AEC0" text-anchor="middle">Monochrome Gray</text>
  </g>

  <!-- VERSION 4: Filled Solid (Icon) -->
  <g transform="translate(600, 0)">
    <rect x="0" y="0" width="200" height="200" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <!-- Solid icon version -->
    <circle cx="100" cy="100" r="82" fill="none" stroke="black" stroke-width="7"/>
    <!-- S curves (thicker for solid appearance) -->
    <path d="M 90 52 C 105 50, 120 58, 122 72 C 123 80, 118 86, 108 88"
          fill="none" stroke="black" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 92 112 C 82 114, 78 120, 78 130 C 78 142, 88 150, 105 150 C 118 150, 128 144, 130 135"
          fill="none" stroke="black" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="100" y="225" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="black" text-anchor="middle">Solid Bold</text>
  </g>
</svg>
