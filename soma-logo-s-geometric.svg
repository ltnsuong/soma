<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sModernGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B8FFE;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7B6EF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A4FD4;stop-opacity:1" />
    </linearGradient>
    <filter id="sModernGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon frame -->
  <polygon points="100,20 160,50 160,150 100,180 40,150 40,50"
           fill="none" stroke="url(#sModernGrad)" stroke-width="2" opacity="0.4"/>

  <!-- Center circle background -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#sModernGrad)" stroke-width="1" opacity="0.15"/>

  <!-- Large bold S -->
  <text x="100" y="120"
        font-family="Arial, Helvetica, sans-serif"
        font-size="140"
        font-weight="800"
        fill="url(#sModernGrad)"
        text-anchor="middle"
        dominant-baseline="middle"
        filter="url(#sModernGlow)"
        letter-spacing="-2">S</text>

  <!-- Center dot accent -->
  <circle cx="100" cy="100" r="10" fill="url(#sModernGrad)" opacity="0.6" filter="url(#sModernGlow)"/>
  <circle cx="100" cy="100" r="6" fill="url(#sModernGrad)"/>
  <circle cx="100" cy="100" r="3" fill="white" opacity="0.5"/>

  <!-- Cardinal accent points -->
  <g fill="url(#sModernGrad)" opacity="0.4" filter="url(#sModernGlow)">
    <circle cx="100" cy="25" r="2.5" />
    <circle cx="175" cy="100" r="2.5" />
    <circle cx="100" cy="175" r="2.5" />
    <circle cx="25" cy="100" r="2.5" />
  </g>
</svg>
