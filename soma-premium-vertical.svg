<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- SOMA Premium Logo: Vertical Version -->
  <!-- Icon stacked above typography -->

  <!-- Icon (circle with S) -->
  <g transform="translate(50, 20)">
    <!-- Outer circle (O) -->
    <circle cx="50" cy="50" r="41" fill="none" stroke="black" stroke-width="4.5"/>

    <!-- S curve -->
    <!-- Upper arc -->
    <path d="M 45 26
             C 52.5 25, 60 29, 61 36
             C 61.5 40, 59 43, 54 44"
          fill="none" stroke="black" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Lower arc -->
    <path d="M 46 56
             C 41 57, 39 60, 39 65
             C 39 71, 44 75, 52.5 75
             C 59 75, 64 72, 65 67.5"
          fill="none" stroke="black" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Typography: "SOMA" -->
  <text x="100" y="235"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="48"
        font-weight="600"
        fill="black"
        text-anchor="middle"
        letter-spacing="-0.5">SOMA</text>
</svg>
