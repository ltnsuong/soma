<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B8FFE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B6EF6;stop-opacity:1" />
    </linearGradient>
    <filter id="sGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#sGradient)" stroke-width="2" opacity="0.4"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#sGradient)" stroke-width="1" opacity="0.2"/>

  <!-- Large elegant S -->
  <text x="100" y="115"
        font-family="Arial, Helvetica, sans-serif"
        font-size="140"
        font-weight="700"
        fill="url(#sGradient)"
        text-anchor="middle"
        dominant-baseline="middle"
        filter="url(#sGlow)"
        letter-spacing="-2">S</text>

  <!-- Accent dots around circle -->
  <g fill="url(#sGradient)" opacity="0.5">
    <circle cx="100" cy="18" r="3" />
    <circle cx="182" cy="100" r="3" />
    <circle cx="100" cy="182" r="3" />
    <circle cx="18" cy="100" r="3" />
  </g>

  <!-- Inner glow circle -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="url(#sGradient)" stroke-width="1" opacity="0.15"/>
</svg>
