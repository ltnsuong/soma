<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- SOMA Premium Logo: Award-winning design -->
  <!-- Minimalist. Iconic. Instantly recognizable. -->
  <!-- S seamlessly integrated inside perfect circular O -->
  <!-- Inspired by: Apple, OpenAI, Stripe -->

  <!-- Outer circle (O) - perfect geometry -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="black" stroke-width="8.5"/>

  <!-- S curve - flows naturally, balanced proportions -->
  <!-- Upper arc of S (right side) -->
  <path d="M 90 52
           C 105 50, 120 58, 122 72
           C 123 80, 118 86, 108 88"
        fill="none" stroke="black" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lower arc of S (left side) -->
  <path d="M 92 112
           C 82 114, 78 120, 78 130
           C 78 142, 88 150, 105 150
           C 118 150, 128 144, 130 135"
        fill="none" stroke="black" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
