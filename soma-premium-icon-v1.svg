<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- SOMA Premium Icon v1: S flowing naturally inside O -->
  <!-- Ultra-clean, perfectly balanced, Swiss design inspired -->

  <!-- Perfect circle O (stroke-based for crispness) -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="black" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- S curve integrated inside O -->
  <!-- Top curve of S -->
  <path d="M 100 55
           C 115 55, 125 65, 125 80
           C 125 88, 120 94, 110 97"
        fill="none" stroke="black" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom curve of S -->
  <path d="M 110 103
           C 120 106, 125 112, 125 120
           C 125 135, 115 145, 100 145
           C 85 145, 75 135, 75 120"
        fill="none" stroke="black" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
