<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F3EAFF"/>
      <stop offset="24%" stop-color="#CBA0FF"/>
      <stop offset="55%" stop-color="#A64BFF"/>
      <stop offset="100%" stop-color="#4A1699"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F5EEFF"/>
      <stop offset="28%" stop-color="#CDA4FF"/>
      <stop offset="58%" stop-color="#A64BFF"/>
      <stop offset="100%" stop-color="#45148F"/>
    </linearGradient>

    <filter id="coreGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="haloGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>

    <!-- blocky S, terminals fused into the ring -->
    <path id="sPath" d="M 306 166
             L 184 166
             C 163 166 156 190 184 199
             C 210 207 248 208 248 235
             L 152 235"/>
  </defs>

  <rect width="400" height="400" fill="#04050A"/>

  <!-- wide violet halo -->
  <g filter="url(#haloGlow)" opacity="0.85">
    <circle cx="200" cy="200" r="122" fill="none" stroke="#A63BFF" stroke-width="15"/>
    <use href="#sPath" fill="none" stroke="#A63BFF" stroke-width="26"
         stroke-linecap="square" stroke-linejoin="miter"/>
  </g>

  <!-- tight bright glow -->
  <g filter="url(#coreGlow)" opacity="0.95">
    <circle cx="200" cy="200" r="122" fill="none" stroke="#CCA6FF" stroke-width="14"/>
    <use href="#sPath" fill="none" stroke="#CCA6FF" stroke-width="24"
         stroke-linecap="square" stroke-linejoin="miter"/>
  </g>

  <!-- RING: extruded wall, face, highlight -->
  <circle cx="202.5" cy="203.5" r="122" fill="none" stroke="#1E1366" stroke-width="15"/>
  <circle cx="200" cy="200" r="122" fill="none" stroke="url(#ringGrad)" stroke-width="14"/>
  <circle cx="200" cy="200" r="122" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.75"
          stroke-dasharray="135 250" stroke-dashoffset="58"/>

  <!-- S: extruded wall, face, top highlight -->
  <use href="#sPath" fill="none" stroke="#1A1158" stroke-width="26"
       stroke-linecap="square" stroke-linejoin="miter" transform="translate(2.5,3.5)"/>
  <use href="#sPath" fill="none" stroke="url(#sGrad)" stroke-width="24"
       stroke-linecap="square" stroke-linejoin="miter"/>
  <use href="#sPath" fill="none" stroke="#FFFFFF" stroke-width="5" opacity="0.5"
       stroke-linecap="square" stroke-linejoin="miter" transform="translate(0,-3)"/>
</svg>
